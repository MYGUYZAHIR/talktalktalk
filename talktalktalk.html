<!-- 
# TalkTalkTalk
#
# is an easy-installable small chat room, with chat history. 
# 
# author:  Joseph Ernest (twitter: @JosephErnest)
# url:     http://github.com/josephernest/talktalktalk
# license: MIT license
 -->

<!DOCTYPE html>
<html>
<head>
<title>TalkTalkTalk</title>
<meta http-equiv="content-type" content="text/html; charset=utf-8" />    
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style type="text/css">
:root {
    --bg-primary: #f8fafc;
    --bg-secondary: #ffffff;
    --bg-tertiary: #f1f5f9;
    --text-primary: #1e293b;
    --text-secondary: #64748b;
    --text-muted: #94a3b8;
    --accent-primary: #3b82f6;
    --accent-secondary: #e0e7ff;
    --accent-hover: #2563eb;
    --border-light: #e2e8f0;
    --border-medium: #cbd5e1;
    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    --radius-sm: 0.375rem;
    --radius-md: 0.5rem;
    --radius-lg: 0.75rem;
    --radius-xl: 1rem;
}

* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background-color: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.5;
}

html { 
    overflow-y: scroll; 
}

/* Input Bar Styling */
#input-container {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border-light);
    padding: 1rem;
    box-shadow: var(--shadow-lg);
    z-index: 100;
}

#input-wrapper {
    max-width: 75%;
    margin: 0 auto;
    display: flex;
    gap: 0.75rem;
    align-items: flex-end;
}

#writing {
    flex: 1;
    min-height: 2.5rem;
    max-height: 8rem;
    padding: 0.75rem 1rem;
    border: 1px solid var(--border-medium);
    border-radius: var(--radius-lg);
    background: var(--bg-secondary);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 0.875rem;
    resize: none;
    outline: none;
    transition: all 0.2s ease;
    box-shadow: var(--shadow-sm);
}

#writing:focus {
    border-color: var(--accent-primary);
    box-shadow: 0 0 0 3px var(--accent-secondary);
}

#writing::placeholder {
    color: var(--text-muted);
}

#send-button {
    min-width: 2.5rem;
    height: 2.5rem;
    background: var(--accent-primary);
    color: white;
    border: none;
    border-radius: var(--radius-lg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: all 0.2s ease;
    box-shadow: var(--shadow-sm);
}

#send-button:hover:not(:disabled) {
    background: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
}

#send-button:disabled {
    background: var(--text-muted);
    cursor: not-allowed;
    transform: none;
    box-shadow: var(--shadow-sm);
}

/* Main Chat Area */
#wrapper { 
    width: 75%; 
    margin: 1rem auto 6rem auto; 
    word-wrap: break-word;
    padding: 0 1rem;
}

#main {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
}

/* Message Bubbles */
.message-bubble {
    max-width: 70%;
    margin-bottom: 0.5rem;
    animation: fadeIn 0.3s ease-out;
}

.message-bubble.own {
    align-self: flex-start;
    margin-right: auto;
}

.message-bubble.other {
    align-self: flex-start;
    margin-right: auto;
}

.message-username {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 0.25rem;
    font-weight: 500;
}

.message-bubble.own .message-username {
    text-align: left;
}

.message-content {
    background: var(--bg-secondary);
    padding: 0.75rem 1rem;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border-light);
    position: relative;
    transition: all 0.2s ease;
    word-wrap: break-word;
    overflow-wrap: break-word;
}

.message-bubble.own .message-content {
    background: var(--accent-primary);
    color: white;
    border-color: var(--accent-primary);
}

.message-content:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
}

.message-content a {
    color: inherit;
    text-decoration: underline;
    text-decoration-color: currentColor;
    opacity: 0.8;
}

.message-bubble.own .message-content a {
    color: white;
}

/* Timestamp tooltip */
.message-timestamp {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text-primary);
    color: white;
    padding: 0.25rem 0.5rem;
    border-radius: var(--radius-sm);
    font-size: 0.75rem;
    white-space: nowrap;
    opacity: 0;
    visibility: hidden;
    transition: all 0.2s ease;
    z-index: 1000;
    margin-bottom: 0.25rem;
}

.message-timestamp::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 4px solid transparent;
    border-top-color: var(--text-primary);
}

.message-content:hover .message-timestamp {
    opacity: 1;
    visibility: visible;
}

/* Sidebar */
#right { 
    width: 20%; 
    top: 0; 
    right: 0; 
    position: fixed; 
    height: calc(100vh - 6rem); 
    padding: 1.5rem 1rem; 
    overflow-y: auto; 
    overflow-x: hidden;
    background: var(--bg-secondary);
    border-left: 1px solid var(--border-light);
    box-shadow: var(--shadow-md);
}

#right h3 {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.75rem;
}

#username { 
    padding: 0.5rem 0.75rem;
    background: var(--bg-tertiary);
    border-radius: var(--radius-md);
    margin-bottom: 1.5rem;
    font-weight: 500;
}

.dashed { 
    display: inline-block; 
    border-bottom: 1px dashed var(--border-medium); 
    cursor: pointer; 
    margin-bottom: 1px;
    transition: all 0.2s ease;
}

.dashed:hover {
    border-bottom-color: var(--accent-primary);
    color: var(--accent-primary);
}

#usernameinput { 
    display: none; 
    width: 100%;
    padding: 0.5rem 0.75rem;
    border: 1px solid var(--border-medium);
    border-radius: var(--radius-md);
    background: var(--bg-secondary);
    font-family: inherit;
}

#connected {
    font-size: 0.875rem;
    line-height: 1.6;
}

#connected div {
    padding: 0.25rem 0;
    color: var(--text-secondary);
}

/* Previous messages link */
#previous { 
    margin-bottom: 1.5rem; 
    display: block;
    text-align: center;
    padding: 0.75rem 1rem;
    background: var(--bg-secondary);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    color: var(--accent-primary);
    text-decoration: none;
    font-weight: 500;
    transition: all 0.2s ease;
    box-shadow: var(--shadow-sm);
}

#previous:hover {
    background: var(--accent-secondary);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
}

/* Popup */
#popup { 
    z-index: 1000; 
    position: fixed; 
    left: 50%; 
    top: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 400px;
    background: var(--bg-secondary); 
    border: 1px solid var(--border-light);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg);
    text-align: center; 
    padding: 2rem 1.5rem; 
    color: var(--text-primary);
}

.hidden { 
    display: none !important; 
}

.opaque { 
    opacity: 0.5;
    pointer-events: none;
}

/* Animations */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Responsive Design */
@media (max-width: 768px) {
    #right {
        width: 280px;
        right: -280px;
        transition: right 0.3s ease;
        z-index: 200;
    }

    #right.open {
        right: 0;
    }

    #sidebar-toggle {
        position: fixed;
        top: 0.75rem;
        right: 0.75rem;
        width: 2.75rem;
        height: 2.75rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--accent-primary);
        color: #fff;
        border: none;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
        z-index: 300;
    }
    #sidebar-toggle:hover { background: var(--accent-hover); }

    #wrapper {
        width: 95%;
        margin: 1rem auto 6rem auto;
    }
    
    #input-wrapper {
        max-width: 95%;
    }
    
    .message-bubble {
        max-width: 85%;
    }
    
    #banner { 
        display: none; 
    }
}

@media (max-width: 480px) {
    #input-wrapper {
        padding: 0.75rem;
    }
    
    #writing {
        font-size: 1rem; /* Prevent zoom on iOS */
    }
    
    .message-bubble {
        max-width: 90%;
    }
}

/* Notification styles */
#notifications {
    margin-bottom: 1.5rem;
}

#notificationswitch {
    padding: 0.25rem 0.5rem;
    background: var(--accent-secondary);
    color: var(--accent-primary);
    border-radius: var(--radius-sm);
    font-size: 0.75rem;
    font-weight: 500;
}

/* Fork banner */
#fork {
    z-index: 10;
}
#sidebar-toggle { display: none; }
/* Chess UI */
#invites .invite-item { margin: 0.25rem 0; padding: 0.25rem 0; color: var(--text-secondary); }
.invite-actions { display: inline-flex; gap: 0.5rem; margin-left: 0.5rem; }
.invite-btn { padding: 0.125rem 0.5rem; border: 1px solid var(--border-light); border-radius: var(--radius-sm); background: var(--bg-secondary); cursor: pointer; font-size: 0.75rem; }
.invite-btn:hover { background: var(--accent-secondary); color: var(--accent-primary); }
#connected .user-row { display: flex; align-items: center; justify-content: space-between; padding: 0.25rem 0; }
#rejoin-wrapper { display: flex; align-items: center; justify-content: space-between; padding: 0.25rem 0; }
#invites .user-row { display: flex; align-items: center; justify-content: space-between; padding: 0.25rem 0; }
.invite-user-btn { padding: 0.125rem 0.5rem; border: 1px solid var(--border-light); border-radius: var(--radius-sm); background: var(--bg-secondary); color: var(--accent-primary); cursor: pointer; font-size: 0.75rem; }
.invite-user-btn:hover { background: var(--accent-secondary); }
.link-sent { margin-left: 0.5rem; color: var(--text-secondary); font-size: 0.75rem; }

#chess-modal { z-index: 1000; position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 95vw; max-width: 720px; background: var(--bg-secondary); border: 1px solid var(--border-light); border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); padding: 1rem; }
.chess-layout { display: grid; grid-template-columns: 1fr 240px; gap: 1rem; }
.chess-board { width: 100%; aspect-ratio: 1 / 1; display: grid; grid-template-columns: repeat(8, 1fr); border: 1px solid var(--border-light); border-radius: var(--radius-lg); overflow: hidden; }
.chess-square { display: flex; align-items: center; justify-content: center; user-select: none; cursor: pointer; position: relative; }
:root { --chess-light: #eeeed2; --chess-dark: #769656; }
.chess-square.light { background: var(--chess-light); }
.chess-square.dark { background: var(--chess-dark); }
.chess-square.selected { outline: 3px solid var(--accent-primary); outline-offset: -3px; }
.chess-square.lastmove { box-shadow: inset 0 0 0 3px rgba(246, 223, 99, 0.45); }
.chess-square.drag-over { outline: 3px solid var(--accent-primary); outline-offset: -3px; }
.chess-square.in-check { box-shadow: inset 0 0 0 3px rgba(220, 53, 69, 0.6); }
.chess-panel { border: 1px solid var(--border-light); border-radius: var(--radius-lg); padding: 0.75rem; height: 100%; display: flex; flex-direction: column; gap: 0.5rem; }
.chess-panel h4 { margin-bottom: 0.25rem; color: var(--text-secondary); font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; }
.chess-status { min-height: 1.5rem; color: var(--text-secondary); }
.chess-actions { margin-top: auto; display: flex; gap: 0.5rem; }
.chess-button { padding: 0.5rem 0.75rem; border: 1px solid var(--border-light); border-radius: var(--radius-md); background: var(--bg-secondary); cursor: pointer; }
.chess-button:hover { background: var(--accent-secondary); color: var(--accent-primary); }

/* Pieces (Staunton-style via external assets) */
.chess-piece { position: absolute; inset: 0; background-position: center; background-repeat: no-repeat; background-size: 80% auto; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.25)); pointer-events: auto; cursor: grab; }
.chess-piece.dragging { cursor: grabbing; opacity: 0.6; }
/* White */
.piece-wk { background-image: url('https://chessboardjs.com/img/chesspieces/wikipedia/wK.png'); }
.piece-wq { background-image: url('https://chessboardjs.com/img/chesspieces/wikipedia/wQ.png'); }
.piece-wr { background-image: url('https://chessboardjs.com/img/chesspieces/wikipedia/wR.png'); }
.piece-wb { background-image: url('https://chessboardjs.com/img/chesspieces/wikipedia/wB.png'); }
.piece-wn { background-image: url('https://chessboardjs.com/img/chesspieces/wikipedia/wN.png'); }
.piece-wp { background-image: url('https://chessboardjs.com/img/chesspieces/wikipedia/wP.png'); }
/* Black */
.piece-bk { background-image: url('https://chessboardjs.com/img/chesspieces/wikipedia/bK.png'); }
.piece-bq { background-image: url('https://chessboardjs.com/img/chesspieces/wikipedia/bQ.png'); }
.piece-br { background-image: url('https://chessboardjs.com/img/chesspieces/wikipedia/bR.png'); }
.piece-bb { background-image: url('https://chessboardjs.com/img/chesspieces/wikipedia/bB.png'); }
.piece-bn { background-image: url('https://chessboardjs.com/img/chesspieces/wikipedia/bN.png'); }
.piece-bp { background-image: url('https://chessboardjs.com/img/chesspieces/wikipedia/bP.png'); }

.promotion-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 10; }
.promotion-overlay::after { content: ''; position: absolute; inset: 0; background: rgba(15, 23, 42, 0.35); }
.promotion-overlay-panel { position: relative; background: var(--bg-secondary); border: 1px solid var(--border-light); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; min-width: 200px; z-index: 1; }
.promotion-overlay-title { font-size: 0.875rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; text-align: center; }
.promotion-overlay-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
.promotion-choice { border: 1px solid var(--border-light); border-radius: var(--radius-md); background: var(--bg-secondary); height: 3rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease; }
.promotion-choice:hover { background: var(--accent-secondary); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
.promotion-piece { width: 2.25rem; height: 2.25rem; background-position: center; background-repeat: no-repeat; background-size: 90% auto; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.2)); }
.promotion-overlay-actions { display: flex; justify-content: center; }
.promotion-cancel { padding: 0.5rem 0.75rem; border: 1px solid var(--border-light); border-radius: var(--radius-md); background: var(--bg-secondary); cursor: pointer; font-size: 0.875rem; }
.promotion-cancel:hover { background: var(--accent-secondary); color: var(--accent-primary); }

@media (max-width: 768px) {
  .chess-layout { grid-template-columns: 1fr; }
}

/* First-time username modal */
.first-login-overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(15, 23, 42, 0.35); z-index: 1001; }
.first-login-overlay.show { display: flex; }
.first-login-panel { background: var(--bg-secondary); border: 1px solid var(--border-light); border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); padding: 1.25rem; width: 90%; max-width: 420px; }
.first-login-title { margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; }
.first-login-input { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--border-medium); border-radius: var(--radius-md); background: var(--bg-secondary); font-family: inherit; font-size: 0.95rem; }
.first-login-actions { display: flex; justify-content: flex-end; margin-top: 0.75rem; }
.first-login-save { padding: 0.5rem 0.75rem; border: none; border-radius: var(--radius-md); background: var(--accent-primary); color: #fff; cursor: pointer; }
.first-login-save:disabled { background: var(--text-muted); cursor: not-allowed; }
.delete-account-btn { position: fixed; bottom: 1rem; right: 1rem; background: #ef4444; color: #fff; border: none; border-radius: var(--radius-lg); padding: 0.5rem 0.75rem; box-shadow: var(--shadow-md); cursor: pointer; z-index: 1000; }
.delete-account-btn:hover { background: #dc2626; }
.danger-btn { background: #ef4444 !important; color: #fff; }
.danger-btn:hover { background: #dc2626 !important; }
</style>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
</head>
<body>

<button id="sidebar-toggle" aria-label="Open sidebar" title="Menu"><i class="fas fa-users"></i></button>

<div id="right">
    <h3>ZyberTalk</h3>
    
    <div id="notifications">
        <h3>Notifications</h3>
        <span id="notificationswitch" class="dashed">on</span>
    </div>
    
    <div>
        <h3>Username</h3>
        <span id="username" class="dashed">user</span>
        <input value="user1" id="usernameinput" maxlength="16" />
    </div>
    
    <div>
        <h3>Game Invites</h3>
        <div id="invites"></div>
    </div>

    <div>
        <h3>Online Users</h3>
        <div id="connected"></div>
    </div>

    <div>
        <h3>Play Stockfish</h3>
        <div id="stockfish-section">
            <div style="font-size: 0.875rem; margin-bottom: 0.75rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Difficulty (ELO):</label>
                <select id="stockfish-difficulty" style="width: 100%; padding: 0.5rem; border: 1px solid var(--border-medium); border-radius: var(--radius-md); background: var(--bg-secondary); font-family: inherit;">
                    <option value="600">600</option>
                    <option value="750">750</option>
                    <option value="900">900</option>
                    <option value="1050">1050</option>
                    <option value="1200">1200</option>
                    <option value="1350">1350</option>
                    <option value="1500">1500</option>
                    <option value="1650">1650</option>
                    <option value="1800">1800</option>
                    <option value="1950">1950</option>
                    <option value="2100">2100</option>
                    <option value="2250">2250</option>
                    <option value="2400">2400</option>
                </select>
            </div>
            <div style="margin-bottom: 0.75rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Play as:</label>
                <div style="display: flex; gap: 0.5rem;">
                    <label style="display: flex; align-items: center; gap: 0.25rem; cursor: pointer;">
                        <input type="radio" id="stockfish-color-white" name="stockfish-color" value="white" checked />
                        <span style="font-size: 0.875rem;">White</span>
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.25rem; cursor: pointer;">
                        <input type="radio" id="stockfish-color-black" name="stockfish-color" value="black" />
                        <span style="font-size: 0.875rem;">Black</span>
                    </label>
                </div>
            </div>
            <button id="stockfish-play-btn" style="width: 100%; padding: 0.5rem; background: var(--accent-primary); color: white; border: none; border-radius: var(--radius-md); cursor: pointer; font-weight: 500; font-size: 0.875rem;">Start Game</button>
        </div>
    </div>
</div>

<div id="wrapper">
    <a id="previous" href="" class="hidden">Load previous messages...</a>
    <div id="main"></div>
</div>

<div id="input-container">
    <div id="input-wrapper">
        <textarea id="writing" placeholder="Type your message..."></textarea>
        <button id="send-button" disabled>
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<div id="popup" class="hidden popup"></div>

<!-- First-time username modal -->
<div id="first-login" class="first-login-overlay hidden">
  <div class="first-login-panel">
    <div class="first-login-title">Set your name</div>
    <input id="first-username-input" class="first-login-input" type="text" maxlength="16" autocomplete="off" placeholder="Enter your name" />
    <div class="first-login-actions">
      <button id="first-username-save" class="first-login-save" disabled>Continue</button>
    </div>
  </div>
</div>

<!-- Delete account confirmation modal -->
<div id="delete-confirm" class="first-login-overlay hidden">
  <div class="first-login-panel">
    <div class="first-login-title">Delete account</div>
    <div style="margin: 0.5rem 0 0.75rem; color: var(--text-secondary); font-size: 0.9rem;">Are you sure? This removes your username from Offline Users.</div>
    <div class="first-login-actions">
      <button id="delete-cancel" class="first-login-save">Cancel</button>
      <button id="delete-confirm-btn" class="first-login-save danger-btn">Delete account</button>
    </div>
  </div>
</div>

<div id="chess-modal" class="hidden">
  <div class="chess-layout">
    <div class="chess-board" id="chess-board"></div>
    <div class="chess-panel">
      <h4>Chess</h4>
      <div class="chess-status" id="chess-status"></div>

function is_scrolled_end() { // See http://stackoverflow.com/a/40370876/1422096
    return ((window.innerHeight + window.pageYOffset) >= document.body.offsetHeight);
}

function scroll_end () {
    document.body.scrollTop = document.body.scrollHeight;                           // both useful because this one not working in FF47
    document.documentElement.scrollTop = document.documentElement.scrollHeight;     // both useful because this one not working in Chrome 43 Android
}

function scroll_top () {
    document.body.scrollTop = 0;

function add_urls(s) {
    return s.replace(/(https?:\/\/[^ ]+)/g, '<a href="$1" target="_blank">$1<\/a>');
}

function timeConverter(t) {     // http://stackoverflow.com/a/40449006/1422096
    if (t == null) 
        return '';
    var a = new Date(t * 1000);
    var today = new Date();
    var yesterday = new Date(Date.now() - 86400000);
    var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    var year = a.getFullYear();
    var month = months[a.getMonth()];
    var date = a.getDate();
    var hour = a.getHours();
    var min = a.getMinutes();
    var time = ("0" + hour).slice(-2) + ':' + ("0" + min).slice(-2);
    if (a.setHours(0,0,0,0) == today.setHours(0,0,0,0))
        return 'today, ' + time;
    else if (a.setHours(0,0,0,0) == yesterday.setHours(0,0,0,0))
        return 'yesterday, ' + time;
    else if (year == today.getFullYear())
        return date + ' ' + month + ', ' + time;
    else
        return date + ' ' + month + ' ' + year + ', ' + time;
}

function mediaPlaybackRequiresUserGesture() { // http://stackoverflow.com/a/40474415/1422096
  var audio = document.createElement('audio');
  audio.play();
  return audio.paused;
}

function initializeStockfish() {
    if (stockfishEngine) return;
    var Stockfish = typeof window.Stockfish === 'undefined' ? require('stockfish') : window.Stockfish;
    stockfishEngine = Stockfish();
    stockfishEngine.onmessage = function(event) {
        var line = event.data;
        if (line.indexOf('bestmove') > -1) {
            var bestmove = line.split(' ')[1];
            if (bestmove && stockfishGame && !stockfishGame.over) {
                makeStockfishMove(bestmove);
            }
        }
    };
    var initCmd = 'uci\n';
    if (stockfishEngine.postMessage) {
        stockfishEngine.postMessage(initCmd);
    }
    stockfishReady = true;
}

function eloToDepth(elo) {
    var baseElo = 600;
    var increment = 150;
    var baseDepth = 5;
    var depthIncrement = 1;
    var steps = Math.round((elo - baseElo) / increment);
    return Math.max(1, baseDepth + steps * depthIncrement);
}

function startStockfishGame(playerColor, elo) {
    if (!stockfishEngine) initializeStockfish();
    var ChessCtor = require('chess.js').Chess;
    var board = new ChessCtor();
    stockfishGame = {
        board: board,
        fen: board.fen(),
        turn: 'w',
        color: playerColor === 'white' ? 'w' : 'b',
        engineColor: playerColor === 'white' ? 'b' : 'w',
        elo: elo,
        depth: eloToDepth(elo),
        over: false
    };
    var me = $('#username').text();
    chessGame = {
        id: 'stockfish_' + Date.now(),
        white: playerColor === 'white' ? me : 'Stockfish (' + elo + ')',
        black: playerColor === 'black' ? me : 'Stockfish (' + elo + ')',
        color: playerColor === 'white' ? 'white' : 'black',
        fen: board.fen(),
        turn: 'white',
        lastMove: null,
        over: false
    };
    $('#chess-white').text(chessGame.white);
    $('#chess-black').text(chessGame.black);
    $('#chess-status').text('Your color: ' + playerColor);
    renderBoard();
    $('#chess-modal').removeClass('hidden');
    if (playerColor === 'black') {
        setTimeout(function() { makeStockfishMove(); }, 500);
    }
}

function makeStockfishMove(bestmove) {
    if (!stockfishGame || stockfishGame.over) return;
    var board = stockfishGame.board;
    var moves;
    if (bestmove) {
        var from = bestmove.substring(0, 2);
        var to = bestmove.substring(2, 4);
        var promotion = bestmove.length > 4 ? bestmove[4] : undefined;
        var moveObj = board.move({ from: from, to: to, promotion: promotion });
        if (!moveObj) return;
        moves = moveObj;
    } else {
        var legalMoves = board.moves({ verbose: true });
        if (legalMoves.length === 0) {
            stockfishGame.over = true;
            var inCheck = board.in_check();
            var result = inCheck ? 'checkmate' : 'stalemate';
            $('#chess-status').text('Game over: ' + result);
            return;
        }
        var position = board.fen();
        var depth = stockfishGame.depth;
        var cmd = 'position fen ' + position + '\ngo depth ' + depth + '\n';
        if (stockfishEngine.postMessage) {
            stockfishEngine.postMessage(cmd);
        }
        return;
    }
    stockfishGame.fen = board.fen();
    stockfishGame.turn = board.turn();
    chessGame.fen = board.fen();
    chessGame.turn = board.turn() === 'w' ? 'white' : 'black';
    chessGame.lastMove = { from: moves.from, to: moves.to };
    renderBoard();
    if (board.in_checkmate() || board.in_stalemate()) {
        stockfishGame.over = true;
        var result = board.in_checkmate() ? 'checkmate' : 'stalemate';
        var winner = board.turn() === 'w' ? 'Black' : 'White';
        $('#chess-status').text('Game over: ' + result + ', ' + winner + ' wins!');
    } else {
        updateChessStatus();
        if (board.turn() === stockfishGame.engineColor) {
            setTimeout(function() { makeStockfishMove(); }, 300);
        }
    }
}

function handleStockfishMove(from, to, promotion) {
    if (!stockfishGame) return false;
    var board = stockfishGame.board;
    var moveObj = board.move({ from: from, to: to, promotion: promotion });
    if (!moveObj) return false;
    stockfishGame.fen = board.fen();
    stockfishGame.turn = board.turn();
    chessGame.fen = board.fen();
    chessGame.turn = board.turn() === 'w' ? 'white' : 'black';
    chessGame.lastMove = { from: from, to: to };
    renderBoard();
    if (board.in_checkmate() || board.in_stalemate()) {
        stockfishGame.over = true;
        var result = board.in_checkmate() ? 'checkmate' : 'stalemate';
        var winner = board.turn() === 'w' ? 'Black' : 'White';
        $('#chess-status').text('Game over: ' + result + ', ' + winner + ' wins!');
    } else {
        updateChessStatus();
        setTimeout(function() { makeStockfishMove(); }, 300);
    }
    return true;
}

function ready() {
    lastPong = undefined;
    users = [];
    offlineUsers = [];

            $(document).on('click keydown', function() { $(document).off('click keydown'); $('#popup').addClass('hidden'); $('body > *:not(#popup)').removeClass('opaque'); });
        else if (clicktoreload)
            $(document).on('click keydown', function() { $(document).off('click keydown'); $(document).off('keydown'); ws.close(); ready(); });
    }

    if (!window.WebSocket) {
        $('#popup').text('Your browser is not supported, please use another browser.').removeClass('hidden');

        $('body > *:not(#popup)').addClass('opaque');
    }

    }

    function getStoredUsername() {
        try { return localStorage.getItem("username"); } catch (e) { return window._fallbackUsername || null; }
    }
    function setStoredUsername(val) {
        try { localStorage.setItem("username", val); } catch (e) { window._fallbackUsername = val; }
    }

    function connectWS() {
        if (ws && (ws.readyState === 0 || ws.readyState === 1)) return;
        var storedWs = (function(){ try { return localStorage.getItem('WS_URL'); } catch(e){ return null; } })();
        var qsWs = (function(){ try { return new URLSearchParams(location.search).get('ws'); } catch(e){ return null; } })();
        if (qsWs) { try { localStorage.setItem('WS_URL', qsWs); } catch(e){} storedWs = qsWs; }
        var wsOverride = (typeof window !== 'undefined' && window.WS_URL) ? window.WS_URL : storedWs;
        var wsScheme = (location.protocol === 'https:') ? 'wss' : 'ws';
        var wsUrl = wsOverride ? wsOverride : (wsScheme + '://' + location.host + '/ws');
        ws = new WebSocket(wsUrl);
        ws.onmessage = handleWsMessage;
          
        $(window).on('beforeunload', function() { 
            if (ws) ws.close(); 
        });

        ws.onopen = function() {
            ws.send(JSON.stringify({ "type" : "username", "username" : $('#username').text() }));
            setTimeout(function(){
                try {
                    var ag = localStorage.getItem('active_game');
                    if (ag) {
                        var obj = JSON.parse(ag);
                        ws.send(JSON.stringify({ type: 'chess_resume_request', game_id: obj.id }));
                    }
                } catch(e){}
            }, 150);
            lastPong = Date.now();
            $('#popup').addClass('hidden'); $(':not(#popup)').removeClass('opaque');
            $('#writing').focus();  
            updateSendButton(); // Initialize send button state
            scroll_end();
            setTimeout(function() { scroll_end(); }, 200);  // useful on touch devices, when keyboard opens
        };

        ws.onclose = function() {
            setTimeout(function() {
                if (!__logoutRequested && ws.readyState != 0 && ws.readyState != 1)
                    popup_message('Click anywhere or press any key to reload the page.', false, true);
             }, 2000);
        };    

        loop = setInterval(function() {
            if (!ws || ws.readyState !== 1) return;
            ws.send('ping');
            if (Date.now() - lastPong > 10000) { // disconnected from internet or phone idle mode; in both cases, ws.readyState can be 1 (OPEN) so we can't use that
                ws.send('ping');   // this is your last chance ! we send a packet now, and if in 1 second, nothings happen, this means we're dead
                setTimeout( function() {
                    if (Date.now() - lastPong > 10000)  // you missed your last chance !
                        popup_message('Click anywhere or press any key to reload the page.', false, true);     // disconnected from internet
                    else                                // ok the phone was just idle, let's resume
                        ws.send(JSON.stringify({ "type" : "username", "username" : $('#username').text() }));  // let's send username again, so that other users see me
                }, 1000);
            }
        }, 5000);
    }

    function showFirstLoginModal() {
        var $overlay = $('#first-login');

            var v = ($input.val() || '').replace(/[:\s]/g, '');

        $input.on('input', updateBtn);

            $('body > *:not(#first-login)').removeClass('opaque');

    }

    $('#previous').click(function(e) {

    if (!ws) {
        $('#writing').prop('disabled', false);

    }

    $(window).on('beforeunload', function(){ try { if (ws) ws.close(); } catch(e){} });

    ws && (lastPong = Date.now());

    $('#previous').off('click');

    $('#previous').click(function(e) {
        if (ws && ws.readyState === 1) ws.send(JSON.stringify({'type': 'messagesbefore', 'id': firstId}));
        e.preventDefault();
        return false;
    });

    // WebSocket message handling
    $(document).off('wsmessage');

    // The rest of handlers and logic remain the same; they will use ws when connected

    $('#previous').click(function(e) {

        e.preventDefault();
        return false;
    });

    // Handlers that depend on ws are safe; UI is blocked by modal until username is set

    // The rest of the original code below


    // Existing event handlers and logic

    $('#username').on('click', function(e) { 
        $('#username').hide(); 
        $('#usernameinput').val($('#username').text()).show().focus(); 
        e.preventDefault(); 
        return false; 
    });

    $('#writing').on('click', function(e) {             // trick for touch devices: when phone keyboard opens, we won't be scrolled-end anymore, so force it
        if (is_scrolled_end())
            setTimeout(function() { scroll_end(); }, 200);

    // Send button functionality
    function sendMessage() {
        var message = $('#writing').val().trim();

    $('#writing').on('input', function() {
        updateSendButton();
        // Auto-resize textarea
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 128) + 'px';
    });

    $('#writing').keydown(function(e) {
        if (e.keyCode == 13 && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
        else if (e.keyCode == 9) {                   // see http://stackoverflow.com/a/40319943/1422096
            var input = document.getElementById('writing');
            var patt = /\b@?(\S+)$/;
            e.preventDefault();
            var start = input.selectionStart;
            var seg = input.value.slice(0, start);
            var match = (seg.match(patt) || [])[0];
            if (!match) { return; }
            var idxUser = users.findIndex(function (x) { return x.startsWith(match); });
            if (idxUser < 0) { return; }
            var replace = users[users[idxUser] === match ? (idxUser + 1) % users.length : idxUser];
            var newSeg = seg.replace(patt, replace);
            input.value = newSeg + input.value.slice(start);
            input.setSelectionRange(newSeg.length, newSeg.length);
        }
        else if (e.keyCode == 33 || e.keyCode == 34) {   // alows to scroll with PAGE UP / DOWN even if textarea has focus
            $('#writing').blur();
            setTimeout(function() { $('#writing').focus(); }, 10);
        }
    });

        $('#chess-white').text(chessGame.white);
        $('#chess-black').text(chessGame.black);
        $('#chess-status').text('Your color: ' + chessGame.color);
        renderBoard();
        $('#chess-modal').removeClass('hidden');
    }

    function renderBoard() {
        if (!chessGame) return;
        var board = $('#chess-board');
        board.empty();
        if (pendingPromotion) {
            hidePromotionDialog();
        } else {
            clearSelection();
        }
        dragSourceSquare = null;

        var parts = chessGame.fen.split(' ');
        var ranksFEN = parts[0].split('/');
        var files = ['a','b','c','d','e','f','g','h'];
        var mapPiece = { 'P':'wp','N':'wn','B':'wb','R':'wr','Q':'wq','K':'wk','p':'bp','n':'bn','b':'bb','r':'br','q':'bq','k':'bk' };
        chessGame.squareMap = {};
        for (var r = 0; r < 8; r++) {
            var row = ranksFEN[r];
            var fileIndex = 0;
            for (var i = 0; i < row.length; i++) {
                var ch = row[i];
                if (/[1-8]/.test(ch)) {
                    fileIndex += parseInt(ch, 10);
                } else {
                    var file = files[fileIndex];
                    var rank = 8 - r; // FEN rows start at rank 8
                    var sq = file + String(rank);
                    var pieceCode = mapPiece[ch] || null;
                    if (pieceCode) chessGame.squareMap[sq] = pieceCode;
                    fileIndex++;
                }
            }
        }

        function appendSquare(sq) {
            var fIndex = sq.charCodeAt(0) - 97; // 'a' -> 0
            var rNum = parseInt(sq.charAt(1), 10);
            var light = ((fIndex + rNum) % 2) === 0;
            var el = $('<div class="chess-square" />').addClass(light ? 'light' : 'dark').attr('data-square', sq);
            var pieceCode = chessGame.squareMap[sq];
            if (pieceCode) {
                var pieceEl = $('<div/>').addClass('chess-piece').addClass('piece-' + pieceCode).attr('draggable', true).attr('data-square', sq).attr('data-piece', pieceCode);
                el.append(pieceEl);
            }
            if (chessGame.lastMove && (sq === chessGame.lastMove.from || sq === chessGame.lastMove.to)) el.addClass('lastmove');
            board.append(el);
        }

        var rankOrder = (chessGame.color === 'white') ? [8,7,6,5,4,3,2,1] : [1,2,3,4,5,6,7,8];
        var fileOrder = (chessGame.color === 'white') ? files : files.slice().reverse();
        for (var ri = 0; ri < rankOrder.length; ri++) {
            for (var fi = 0; fi < fileOrder.length; fi++) {
                appendSquare(fileOrder[fi] + String(rankOrder[ri]));
            }
        }

        $('#chess-board .chess-square').removeClass('in-check');
        if (chessGame.inCheck) {
            var targetKing = (chessGame.turn === 'white') ? 'wk' : 'bk';
            var kingSq = null;
            for (var key in chessGame.squareMap) {
                if (chessGame.squareMap[key] === targetKing) { kingSq = key; break; }
            }
            if (kingSq) {
                $('#chess-board .chess-square[data-square="' + kingSq + '"]').addClass('in-check');
            }
        }
    }

    function squarePieceCode(sq) {
        if (!chessGame || !chessGame.squareMap) return null;
        return chessGame.squareMap[sq] || null;
    }

    function isPlayersPiece(pieceCode) {
        if (!chessGame || !pieceCode) return false;
        if (stockfishGame) {
            var playerColorLetter = stockfishGame.color === 'w' ? 'w' : 'b';
            return pieceCode.charAt(0) === playerColorLetter;
        }
        if (pieceCode.charAt(0) === 'w') return chessGame.color === 'white';
        if (pieceCode.charAt(0) === 'b') return chessGame.color === 'black';
        return false;
    }

    function clearSelection() {
        selectedSquare = null;
        $('#chess-board .chess-square').removeClass('selected');
    }

    function requiresPromotion(pieceCode, targetSquare) {
        if (!pieceCode || pieceCode.charAt(1) !== 'p') return false;
        var rank = parseInt(String(targetSquare).charAt(1), 10);
        if (isNaN(rank)) return false;
        if (pieceCode.charAt(0) === 'w') return rank === 8;
        return rank === 1;
    }

    function openPromotionDialog(from, to, pieceCode) {
        pendingPromotion = { from: from, to: to, color: pieceCode.charAt(0) };
        var options = $('#promotion-options');
        options.empty();
        var prefix = pendingPromotion.color;
        ['q','r','b','n'].forEach(function(symbol) {
            var option = $('<button type="button" class="promotion-choice" />').attr('data-promotion', symbol);
            option.append($('<div/>').addClass('promotion-piece').addClass('piece-' + prefix + symbol));
            options.append(option);
        });
        $('#chess-board .chess-square').removeClass('selected');
        $('#chess-board .chess-square[data-square="' + from + '"]').addClass('selected');
        $('#chess-board .chess-square[data-square="' + to + '"]').addClass('selected');
        selectedSquare = from;
        $('#promotion-overlay').removeClass('hidden');
    }

    function hidePromotionDialog() {
        pendingPromotion = null;
        $('#promotion-overlay').addClass('hidden');
        $('#promotion-options').empty();
        clearSelection();
    }

    function sendMove(from, to, promotion) {
        if (!chessGame) return;
        if (stockfishGame) {
            handleStockfishMove(from, to, promotion);
            return;
        }
        if (!ws || ws.readyState !== 1) return;
        var payload = { type: 'chess_move', game_id: chessGame.id, from: from, to: to };
        if (promotion) payload.promotion = promotion;
        ws.send(JSON.stringify(payload));
        clearSelection();
        $('#chess-board .chess-square').removeClass('drag-over');
    }

    function attemptMove(from, to) {
        if (!chessGame || pendingPromotion) return;
        var myTurn = chessGame.turn === chessGame.color;
        if (!myTurn) {
            flashStatus('Wait your turn');
            return;
        }
        if (!from || !to || from === to) return;
        var pieceCode = squarePieceCode(from);
        if (!pieceCode) {
            clearSelection();
            return;
        }
        if (!isPlayersPiece(pieceCode)) {
            flashStatus('Not your piece');
            clearSelection();
            return;
        }
        if (requiresPromotion(pieceCode, to)) {
            openPromotionDialog(from, to, pieceCode);
        } else {
            sendMove(from, to, null);
        }
    }

    function onSquareClick() {
        if (!chessGame || pendingPromotion) return;
        var sq = $(this).data('square');
        var pieceCode = squarePieceCode(sq);
        var myTurn = chessGame.turn === chessGame.color;
        if (!selectedSquare) {
            if (!pieceCode) return;
            if (!myTurn) { flashStatus('Wait your turn'); return; }
            if (!isPlayersPiece(pieceCode)) { flashStatus('Not your piece'); return; }
            selectedSquare = sq;
            $('#chess-board .chess-square').removeClass('selected');
            $(this).addClass('selected');
            return;
        }
        if (selectedSquare === sq) {
            clearSelection();
            return;
        }
        if (pieceCode && isPlayersPiece(pieceCode) && myTurn) {
            selectedSquare = sq;
            $('#chess-board .chess-square').removeClass('selected');
            $(this).addClass('selected');
            return;
        }
        attemptMove(selectedSquare, sq);
    }

    function onPieceDragStart(e) {
        if (!chessGame || pendingPromotion) { e.preventDefault(); return; }
        var parentSquare = $(this).parent().data('square');
        var pieceCode = squarePieceCode(parentSquare);
        if (!pieceCode) { e.preventDefault(); return; }
        if (!isPlayersPiece(pieceCode)) { flashStatus('Not your piece'); e.preventDefault(); return; }
        if (chessGame.turn !== chessGame.color) { flashStatus('Wait your turn'); e.preventDefault(); return; }
        dragSourceSquare = parentSquare;
        $('#chess-board .chess-square').removeClass('selected');
        $('#chess-board .chess-square[data-square="' + parentSquare + '"]').addClass('selected');
        selectedSquare = parentSquare;
        $(this).addClass('dragging');
        var dt = e.originalEvent && e.originalEvent.dataTransfer;
        if (dt) {
            dt.setData('text/plain', parentSquare);
            dt.effectAllowed = 'move';
        }
    }

    function onPieceDragEnd() {
        $(this).removeClass('dragging');
        dragSourceSquare = null;
        clearSelection();
        $('#chess-board .chess-square').removeClass('drag-over');
    }

    function onSquareDragOver(e) {
        if (!dragSourceSquare) return;
        e.preventDefault();
        $(this).addClass('drag-over');
    }

    function onSquareDragLeave() {
        $(this).removeClass('drag-over');
    }

    function onSquareDrop(e) {
        if (!dragSourceSquare) return;
        e.preventDefault();
        var target = $(this).data('square');
        $('#chess-board .chess-piece.dragging').removeClass('dragging');
        $('#chess-board .chess-square').removeClass('drag-over');
        var from = dragSourceSquare;
        dragSourceSquare = null;
        attemptMove(from, target);
    }

    function onPromotionChoice() {
        if (!pendingPromotion) return;
        var details = pendingPromotion;
        var promotion = $(this).data('promotion');
        hidePromotionDialog();
        if (details && promotion) {
            sendMove(details.from, details.to, promotion);
        }
    }

    function updateChessStatus() {
        if (!chessGame) { $('#chess-status').text(''); return; }
        var turnName = (chessGame.turn === 'white') ? chessGame.white : chessGame.black;
        var suffix = chessGame && chessGame.inCheck ? ' (check)' : '';
        $('#chess-status').text('Turn: ' + turnName + suffix);
    }

    function flashStatus(text) {
        if (!text) return;
        $('#chess-status').text(text);
        setTimeout(function(){ if (chessGame) updateChessStatus(); else $('#chess-status').text(''); }, 1500);
    }

    // WebSocket message handler
    function handleWsMessage(e) { 
        lastPong = Date.now();
        if (typeof e['data'] === 'string' && e['data'].slice(0,2) === 'id') {
            var serverlastid = e['data'].slice(2);
            if (serverlastid != lastId) { // some messages were lost
                if (ws && ws.readyState === 1) ws.send(JSON.stringify({'type': 'messagesafter', 'id': lastId}));
            }
            return;
        }
        var data;
        try { data = JSON.parse(e['data']); } catch(_) { return; }
        if (data['type'] === 'message') {
            if (data['id'] > lastId + 1) {  // some messages were lost
                if (ws && ws.readyState === 1) ws.send(JSON.stringify({'type': 'messagesafter', 'id': lastId}));
                return;
            }
            lastId = data['id'];
            var isscrolledend = is_scrolled_end();
            var isOwnMessage = data['username'] === $('#username').text();
            var bubbleClass = isOwnMessage ? 'own' : 'other';
            var messageHtml = '<div class="message-bubble ' + bubbleClass + '">' +
                '<div class="message-username">' + data['username'] + '</div>' +
                '<div class="message-content">' +
                    '<div class="message-timestamp">' + timeConverter(data['datetime']) + '</div>' +
                    add_urls(data['message']) +
                '</div>' +
                '</div>';
            $('#main').append(messageHtml);
            if (isscrolledend)
                scroll_end();
            if (data['username'] !== $('#username').text() && data['username'] !== displayeduser && $('#notificationswitch').text() === 'on') {
                
            }
            if (document.hidden && data['username'] !== $('#username').text()) {
                __unread += 1; __updateTitleBadge();
            }
        }
        else if (data['type'] === 'messages') {
            var newmessages = document.createDocumentFragment();
            var messagelist = data['messages'];
            for (var i = 0; i < messagelist.length; i++) {
                var msg = JSON.parse(messagelist[i]);
                if (data['before'] != 1 && msg['id'] <= lastId)       // message already added 
                    continue;
                var isOwnMessage = msg['username'] === $('#username').text();
                var bubbleClass = isOwnMessage ? 'own' : 'other';
                var messageHtml = '<div class="message-bubble ' + bubbleClass + '">' +
                    '<div class="message-username">' + msg['username'] + '</div>' +
                    '<div class="message-content">' +
                        '<div class="message-timestamp">' + timeConverter(msg['datetime']) + '</div>' +
                        add_urls(msg['message']) +
                    '</div>' +
                    '</div>';
                $(newmessages).append(messageHtml);
                firstId = Math.min(firstId, msg['id'])
                lastId = Math.max(lastId, msg['id']);
            }
            if (data['before'] == 1)
                $('#main').prepend(newmessages); 
            else
                $('#main').append(newmessages);
            if (firstId > 0 && firstId != Infinity)
                $('#previous').removeClass('hidden');
            else
                $('#previous').addClass('hidden');
            if (data['before'] == 1)
                scroll_top();
            else
                scroll_end();
        }
        else if (data['type'] === 'userlist') {
            users = data['connected'];
            offlineUsers = data['offline'] || [];
            renderUserLists();
        }
        else if (data['type'] === 'chess_invite') {
            addInvite(data['from']);
            if (document.hidden || data['offline']) { __chessUnread += 1; __updateTitleBadge(); }
        }
        else if (data['type'] === 'chess_resume') {
            var me = $('#username').text();
            chessGame = {
                id: data['game_id'],
                white: data['white'],
                black: data['black'],
                color: (data['white'] === me) ? 'white' : 'black',
                fen: data['fen'],
                turn: data['turn'],
                lastMove: null,
                over: false
            };
            try { localStorage.setItem('active_game', JSON.stringify({ id: chessGame.id, white: chessGame.white, black: chessGame.black })); } catch(e){}
            $('#chess-white').text(chessGame.white);
            $('#chess-black').text(chessGame.black);
            showRejoinPrompt();
        }
        else if (data['type'] === 'chess_start') {
            try { localStorage.setItem('active_game', JSON.stringify({ id: data['game_id'], white: data['white'], black: data['black'] })); } catch(e){}
            startChessGame(data);
        }
        else if (data['type'] === 'chess_move') {
            if (chessGame && chessGame.id === data['game_id']) {
                chessGame.fen = data['fen'];
                chessGame.turn = data['turn'];
                chessGame.inCheck = !!data['check'];
                chessGame.lastMove = { from: data['from'], to: data['to'] };
                renderBoard();
                updateChessStatus();
                if (document.hidden && chessGame.turn === chessGame.color) { __chessUnread += 1; __updateTitleBadge(); }
            }
        }
        else if (data['type'] === 'chess_over') {
            try { localStorage.removeItem('active_game'); } catch(e){}
            if (chessGame && chessGame.id === data['game_id']) {
                chessGame.over = true;
                $('#chess-status').text('Game over: ' + data['result'] + ' (' + data['reason'] + ')');
                hideRejoinPrompt();
            }
        }
        else if (data['type'] === 'chess_illegal') {
            flashStatus('Illegal move');
        }
        else if (data['type'] === 'chess_error') {
            flashStatus(data['message'] || 'Error');
        }
        else if (data['type'] === 'username') {  // server asks to (re)send username
            if (ws && ws.readyState === 1) ws.send(JSON.stringify({ "type" : "username", "username" : $('#username').text() }));
        }
        else if (data['type'] === 'usernameunavailable') {
            $('#username').text(data['username']);
            setStoredUsername($('#username').text());
            popup_message('Your username has been changed because the one you entered is reserved.', true, false);
        }
        else if (data['type'] === 'flood') {
            popup_message('Please do not flood this chat.', false, false);
            ws.onclose = undefined;
            clearInterval(loop);
            ws.close();
        }
        else if (data['type'] === 'displayeduser') {
            displayeduser = data['username'];
        }
    }

    // Attach onmessage when connection is established
    var _origOpen = connectWS;
    var __connectCalled = false;
    connectWS = function(){
        if (__connectCalled) return; __connectCalled = true; _origOpen();
        if (ws) ws.onmessage = handleWsMessage;
    };
}

$(document).ready(ready);

</script>
